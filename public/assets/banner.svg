<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340" role="img" aria-label="Topologie: Controller orchestriert zwei Agenten und ein Deployment-Ziel">
  <!-- Reine Topologie-Illustration (ohne Titeltext — der steht als Folientitel). -->
  <!-- Orchestrierung (gestrichelt, orange) vom Controller zu den Agenten -->
  <path d="M372 92 L240 156" stroke="#E8520A" stroke-width="2.5" stroke-dasharray="6 5" fill="none" />
  <path d="M428 92 L560 156" stroke="#E8520A" stroke-width="2.5" stroke-dasharray="6 5" fill="none" />
  <!-- Daten-/Testfluss (durchgezogen) von den Agenten zum Zielsystem -->
  <path d="M232 196 L372 256" stroke="#EEF1F4" stroke-width="2.5" fill="none" />
  <path d="M568 196 L428 256" stroke="#EEF1F4" stroke-width="2.5" fill="none" />

  <!-- host1 — Controller (oben) -->
  <circle cx="400" cy="70" r="36" fill="#16395F" stroke="#E8520A" stroke-width="3" />
  <text x="400" y="66" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#EEF1F4">host1</text>
  <text x="400" y="84" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#9FB3C8">Controller</text>

  <!-- host2 — Agent maven (links) -->
  <circle cx="210" cy="176" r="32" fill="#16395F" stroke="#F5A623" stroke-width="3" />
  <text x="210" y="172" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#EEF1F4">host2</text>
  <text x="210" y="189" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#9FB3C8">maven</text>

  <!-- host4 — Agent pytest (rechts) -->
  <circle cx="590" cy="176" r="32" fill="#16395F" stroke="#F5A623" stroke-width="3" />
  <text x="590" y="172" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#EEF1F4">host4</text>
  <text x="590" y="189" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#9FB3C8">pytest</text>

  <!-- host3 — Deployment-Ziel (unten) -->
  <circle cx="400" cy="282" r="30" fill="#16395F" stroke="#EEF1F4" stroke-width="2.5" />
  <text x="400" y="278" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#EEF1F4">host3</text>
  <text x="400" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#9FB3C8">Ziel</text>
</svg>
