<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" role="img" aria-label="Datenfluss-Diagramm der verteilten Jenkins-Umgebung über vier Hosts">
  <defs>
    <marker id="arrow-solid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#E8520A" />
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#55606B" />
    </marker>
  </defs>

  <rect width="900" height="520" fill="#FFFFFF" />

  <!-- Knoten -->
  <g font-family="Inter, Arial, sans-serif">
    <!-- host1 Controller -->
    <rect x="350" y="30" width="200" height="86" rx="10" fill="#0E2A4A" />
    <text x="450" y="62" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">host1 · Controller</text>
    <text x="450" y="86" text-anchor="middle" font-size="13" fill="#EEF1F4">10.0.0.11 · jenkins.example.com</text>
    <text x="450" y="104" text-anchor="middle" font-size="12" fill="#F5A623">Orchestrierung · Checkout · Report</text>

    <!-- host2 Build -->
    <rect x="60" y="230" width="200" height="86" rx="10" fill="#16395F" />
    <text x="160" y="262" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">host2 · Agent maven</text>
    <text x="160" y="286" text-anchor="middle" font-size="13" fill="#EEF1F4">10.0.0.12 · Build</text>
    <text x="160" y="304" text-anchor="middle" font-size="12" fill="#F5A623">Build · Unit-Test · Deploy</text>

    <!-- host4 Test -->
    <rect x="640" y="230" width="200" height="86" rx="10" fill="#16395F" />
    <text x="740" y="262" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">host4 · Agent pytest</text>
    <text x="740" y="286" text-anchor="middle" font-size="13" fill="#EEF1F4">10.0.0.14 · Test</text>
    <text x="740" y="304" text-anchor="middle" font-size="12" fill="#F5A623">Smoke-Wait · ITest</text>

    <!-- host3 Deploy-Ziel -->
    <rect x="350" y="420" width="200" height="80" rx="10" fill="#55606B" />
    <text x="450" y="452" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">host3 · Deployment-Ziel</text>
    <text x="450" y="476" text-anchor="middle" font-size="13" fill="#EEF1F4">10.0.0.13 · demo-app (systemd)</text>
  </g>

  <!-- Orchestrierung (gestrichelt) vom Controller zu den Agenten -->
  <g stroke="#55606B" stroke-width="2" stroke-dasharray="7 6" fill="none">
    <path d="M360 96 C250 140 200 180 175 224" marker-end="url(#arrow-solid)" stroke="#55606B" marker-start="" />
    <path d="M540 96 C660 140 710 180 725 224" stroke="#55606B" />
  </g>
  <!-- saubere gestrichelte Orchestrierungspfeile -->
  <path d="M362 100 C255 145 205 182 178 222" stroke="#55606B" stroke-width="2" stroke-dasharray="7 6" fill="none" marker-end="url(#arrow-dash)" />
  <path d="M538 100 C645 145 695 182 722 222" stroke="#55606B" stroke-width="2" stroke-dasharray="7 6" fill="none" marker-end="url(#arrow-dash)" />

  <!-- Datenfluss (durchgezogen) -->
  <!-- Build-Artefakt (JAR) host2 -> host3 -->
  <path d="M210 318 C260 380 320 410 360 432" stroke="#E8520A" stroke-width="2.5" fill="none" marker-end="url(#arrow-solid)" />
  <!-- host4 testet host3 (Smoke-Wait / ITest gegen demo-app) -->
  <path d="M690 318 C640 380 580 410 540 432" stroke="#E8520A" stroke-width="2.5" fill="none" marker-end="url(#arrow-solid)" />
  <!-- Testreport host4 -> host1 (Report) -->
  <path d="M722 224 C660 150 600 120 552 100" stroke="#E8520A" stroke-width="2.5" fill="none" stroke-dasharray="0" opacity="0" />

  <!-- Beschriftungen Datenfluss -->
  <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#1A1A1A">
    <text x="250" y="392" transform="rotate(40 250 392)">JAR via scp</text>
    <text x="600" y="392" transform="rotate(-40 600 392)">HTTP-Test</text>
  </g>

  <!-- Legende -->
  <g font-family="Inter, Arial, sans-serif" font-size="13" fill="#1A1A1A">
    <line x1="60" y1="40" x2="100" y2="40" stroke="#E8520A" stroke-width="2.5" marker-end="url(#arrow-solid)" />
    <text x="108" y="44">Artefakt-/Datenfluss</text>
    <line x1="60" y1="64" x2="100" y2="64" stroke="#55606B" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow-dash)" />
    <text x="108" y="68">Orchestrierung (Controller)</text>
  </g>
</svg>
